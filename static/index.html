<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Ubuntu Server Monitor</title>
	<link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
	<header>
		<h1 id="hostname">Ubuntu Server Monitor</h1>
		<div class="status-line">
			<span id="time"></span>
			<span id="uptime"></span>
			<span id="load"></span>
		</div>
	</header>

	<main>
		<section>
			<h2>CPU</h2>
			<div id="cpu-bars" class="bars"></div>
			<p id="cpu-meta"></p>
		</section>

		<section>
			<h2>Memory</h2>
			<div class="bar-wrapper">
				<label>RAM</label>
				<div class="progress">
					<div id="ram-bar"></div>
				</div>
				<span id="ram-text"></span>
			</div>
			<div class="bar-wrapper">
				<label>Swap</label>
				<div class="progress">
					<div id="swap-bar"></div>
				</div>
				<span id="swap-text"></span>
			</div>
		</section>

		<section>
			<h2>Disk</h2>
			<p id="disk"></p>
		</section>

		<section>
			<h2>Network</h2>
			<p id="network"></p>
		</section>

		<section>
			<h2>Temperatures</h2>
			<ul id="temps"></ul>
		</section>

		<section>
			<h2>Top processes</h2>
			<table>
				<thead>
					<tr>
						<th>PID</th>
						<th>Name</th>
						<th>User</th>
						<th>CPU%</th>
						<th>MEM%</th>
					</tr>
				</thead>
				<tbody id="procs"></tbody>
			</table>
		</section>

		<section>
			<h2>Restart server</h2>
			<div class="restart-controls">
				<input type="password" id="api-key" placeholder="API token" />
				<button id="restart-btn">Restart</button>
				<span id="restart-status"></span>
			</div>
			<p class="hint">Restart requires MONITOR_ALLOW_RESTART=1 and a valid API token.</p>
		</section>
	</main>

	<script src="/static/app.js" type="module"></script>
</body>

</html>
